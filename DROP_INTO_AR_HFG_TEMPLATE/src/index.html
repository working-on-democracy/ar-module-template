<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#070b0d" />
    <title>Liquid Civic Mirror WebAR</title>
    <link rel="icon" href="./assets/dms/app-icon.svg" />
    <meta name="8thwall:renderer" content="aframe:1.3.0" />
    <meta name="8thwall:package" content="@8thwall.xrextras" />
    <meta name="8thwall:package" content="@8thwall.landing-page" />

    <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
    <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
    <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
    <script crossorigin="anonymous" src="./external/xr/xr.js" data-preload-chunks="slam" async="true"></script>
  </head>
  <body data-dms-tracking-mode="world">
    <div class="fallback-scene" aria-hidden="true"></div>
    <div id="runtimeWarning" class="runtime-warning" hidden>Runtime loading...</div>
    <div id="targetStatus" class="target-status">Starting camera AR. Move phone slowly after the poster appears...</div>
    <script src="bundle.js?v=20260702-white-balance-glass-v20"></script>

    <a-scene
      id="scene"
      landing-page
      xrextras-loading
      xrextras-runtime-error
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: auto; alpha: true; maxCanvasWidth: 1280; maxCanvasHeight: 1920"
      xrconfig="allowedDevices: mobile-and-headsets; cameraDirection: back"
      xrweb="disableWorldTracking: false; scale: absolute"
    >
      <a-camera
        id="camera"
        position="0 1.58 0"
        raycaster="objects: .cantap; far: 12"
        cursor="fuse: false; rayOrigin: mouse;"
      ></a-camera>

      <a-entity light="type: ambient; intensity: 0.9; color: #e9feff"></a-entity>
      <a-entity light="type: directional; intensity: 1.4; color: #ffffff" position="0.6 2.6 1.2"></a-entity>
      <a-entity
        id="dms-room-anchor"
        dms-world-room-anchor="
          autoPlace: true;
          distance: 3.0;
          groundY: 0.04;
          placementDelayMs: 650;
          minCameraTravelBeforePlace: 0;
          minXrPoseTravelBeforePlace: 0;
          maxXrPoseAgeMs: 700;
          requireXrWorldPose: false;
          requireSceneCameraMotion: false;
          placementMode: camera;
          minPlacementDistance: 1.2;
          maxPlacementDistance: 5.2;
          stablePlacementSamples: 4;
          stablePlacementRadius: 0.28;
          waitForRealityReady: false;
          waitForTrackingNormal: false;
        "
      >
        <a-entity
          id="dms-installation"
          class="cantap"
          position="0 0 0"
          rotation="0 0 0"
          dms-mirror-shards="
            dataUrl: assets/dms/assets/shards-data.json;
            seriesUrl: assets/dms/assets/single-liquid-series.json;
            autoCycle: false;
            panelLimit: 1;
            enableFracture: false;
            enableGpuMotion: true;
            quality: auto;
            idleRotationEnabled: true;
            idleRotationStrength: 1;
            shockAfterglow: 1;
            liquidShockCoupling: 1;
            faceCameraOnStart: false;
            layoutScale: 1.55;
            displayScale: 2.05;
            allowQueryScale: true;
            queryScaleMin: 1.85;
            queryScaleMax: 2.5;
            placeFromCameraOnStart: false;
            manualPlacementOnStart: false;
            placementDistance: 3.0;
            placementGroundY: 0.04;
            placementDelayMs: 180;
            autoPlacementFallbackMs: 0;
          "
        ></a-entity>
      </a-entity>
    </a-scene>

    <nav class="control-bar" aria-label="Prototype controls">
      <button id="pulseButton" class="icon-button is-blue" type="button" aria-label="Add democratic blue" title="Add democratic blue">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="2.5"></circle>
          <path d="M5.7 12a6.3 6.3 0 0 1 12.6 0"></path>
          <path d="M3.1 12a8.9 8.9 0 0 1 17.8 0"></path>
        </svg>
      </button>
      <button id="nextButton" class="icon-button is-orange" type="button" aria-label="Add authoritarian orange" title="Add authoritarian orange">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5.5 13 12l-8 6.5Z"></path>
          <path d="M15 6v12"></path>
          <path d="M19 6v12"></path>
        </svg>
      </button>
    </nav>
  </body>
</html>
