<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0, user-scalable=no" />
  <title>AR Module Preview (8th Wall)</title>
  <!-- Full host runtime so the module previews exactly as it runs in production:
       8frame (8thwall's A-Frame) → aframe-extras → xrextras → the 8th Wall engine.
       8frame comes from the 8thwall CDN (version-pinned) and aframe-extras from
       jsDelivr; xrextras and the engine (xr.js) are self-hosted — copied from
       @8thwall/xrextras / @8thwall/engine-binary into /external/ by
       vite-plugin-static-copy (see vite.config.ts). -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <!-- Self-hosted xrextras (pinned @8thwall/xrextras, not 8thwall's unversioned
       CDN xrextras.js which mutates in place). Loaded via a runtime-resolved URL
       for the same reason as the engine below: the file only exists after the
       copy plugin runs, so a build-time <script src> would fail to bundle.
       async=false preserves order — after aframe-extras, before the engine. -->
  <script>
    (function () {
      var s = document.createElement("script");
      s.src = new URL("external/xrextras/xrextras.js", document.baseURI).href;
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
  <!-- Load the self-hosted engine with a URL resolved relative to THIS page at
       runtime, so the build (dist-ar/) works when served from any subdirectory.
       A root-absolute path breaks in a subdir; a relative script path would make
       Vite try to bundle a file that only exists after vite-plugin-static-copy
       runs. This inline loader sidesteps both. -->
  <script>
    (function () {
      var s = document.createElement("script");
      s.src = new URL("external/xr/xr.js", document.baseURI).href;
      s.setAttribute("data-preload-chunks", "slam");
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    .preview-overlay {
      position: fixed; top: 12px; left: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: white; padding: 8px 12px;
      border-radius: 8px;
      font-family: sans-serif; font-size: 13px;
      z-index: 100; pointer-events: none;
      line-height: 1.4;
    }
    .preview-overlay strong { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="preview-overlay">
    <strong>AR Module Preview · 8th Wall</strong><br/>
    Grant camera access · move your device to place the scene
  </div>
  <div id="app"></div>
  <script type="module" src="/lib/preview-ar.ts"></script>
</body>
</html>
