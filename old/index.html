<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>8Wall AFrame Template</title>
    <meta itemprop="name" content="8Wall AFrame Template">
    <meta name="twitter:title" content="8Wall AFrame Template">
    <meta property="og:title" content="8Wall AFrame Template">
    <meta property="og:site_name" content="8Wall AFrame Template">
    <meta name="description" content="">
    <meta itemprop="description" content="">
    <meta property="og:description" content="">
    <meta name="twitter:description" content="">
    <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
    <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
    <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
    <script crossorigin="anonymous" src="./external/xr/xr.js" data-preload-chunks="face, slam" async="true"></script>

    <!-- Eruda Script, activate for debugging in mobile browsers -->
    <!--
        <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
        <script>eruda.init();</script>
    -->

    </script>

    <!-- Copyright (c) 2022 8th Wall, Inc. -->
    <!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

    <!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
    <meta name="8thwall:renderer" content="aframe:1.3.0"/>
    <meta name="8thwall:package" content="@8thwall.xrextras"/>
    <meta name="8thwall:package" content="@8thwall.landing-page"/>

    <!-- Other external scripts and meta tags can also be added. -->
    <script src="./external/scripts/aframe-extras-6.1.1.min.js"></script>

</head>

<body>
<script src="bundle.js"></script>

<a-scene
        id="scene"
        xrextras-gesture-detector
        landing-page
        xrextras-loading
        xrextras-runtime-error
        renderer="colorManagement: true"
        no-frustrum-cull
        xrweb="allowedDevices: any; disableWorldTracking: false"
>


    <!-- We can define assets here to be loaded when A-Frame initializes -->
    <a-assets>
        <a-asset-item id="Rosa" src="assets/Rosa.glb"></a-asset-item>
    </a-assets>

        <a-camera
                id="camera"
                raycaster="objects: .cantap"
                cursor="fuse: false; rayOrigin: mouse;"
                position="0 8 8">
        </a-camera>

    <a-entity light="type: ambient; intensity: 10"></a-entity>

<a-entity
                light="
                    type: directional;
                    intensity: 1;
                    castShadow: true;
                    shadowMapHeight:4096;
                    shadowMapWidth:4096;
                    shadowCameraTop: 80;
                    shadowCameraBottom: -80;
                    shadowCameraRight: 80;
                    shadowCameraLeft: -80;
                    target: #group;
                    shadowRadius: 80"
                xrextras-attach="target: group; offset: 0 50 1;"
                shadow>
</a-entity>





    <!-- example 3D model (fish) -->
        <a-entity
                gltf-model="#Rosa"
                unlit-materials
                scale="12 12 12"
                rotation="0 0 0"
                position="0 0 -30"
                shadow>
            <a-entity id="group" position="0 0 0"></a-entity>
        </a-entity>

    <!-- example primitive (plane) as ground -->

        <a-plane
                id="ground"
                rotation="-90 0 0"
                position="-50 0 -50"
                width="500"
                height="500"
                material="shader: shadow; opacity: 0.3; transparent: true"
                shadow
        ></a-plane>



    <!-- example Image Tracking -->
    <!--
    <xrextras-named-image-target name="video-target">
        <a-entity xrextras-play-video="video: #jelly-video; thumb: #jelly-thumb; canstop: true"
                  geometry="primitive: plane; height: 1; width: 0.79;"></a-entity>
    </xrextras-named-image-target> -->

    </a-scene>
</body>

</html>
