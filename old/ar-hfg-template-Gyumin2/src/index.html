<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>8Wall AFrame Template</title>
    <meta itemprop="name" content="8Wall AFrame Template">
    <meta name="twitter:title" content="8Wall AFrame Template">
    <meta property="og:title" content="8Wall AFrame Template">
    <meta property="og:site_name" content="8Wall AFrame Template">
    <meta name="description" content="">
    <meta itemprop="description" content="">
    <meta property="og:description" content="">
    <meta name="twitter:description" content="">
    <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
    <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
    <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
    <script crossorigin="anonymous" src="./external/xr/xr.js" data-preload-chunks="face, slam" async="true"></script>


    <!-- Eruda Script, activate for debugging in mobile browsers -->
    <!--
        <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
        <script>eruda.init();</script>
    -->

    <!-- Copyright (c) 2022 8th Wall, Inc. -->
    <!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

    <!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
    <meta name="8thwall:renderer" content="aframe:1.3.0"/>
    <meta name="8thwall:package" content="@8thwall.xrextras"/>
    <meta name="8thwall:package" content="@8thwall.landing-page"/>

    <!-- Other external scripts and meta tags can also be added. -->
    <script src="./external/scripts/aframe-extras-6.1.1.min.js"></script>

</head>

<body>
<script src="bundle.js"></script>

<a-scene
        id="scene"
        xrextras-gesture-detector
        landing-page
        xrextras-loading
        xrextras-runtime-error
        renderer="colorManagement: true"
        no-frustrum-cull
        xrweb="allowedDevices: any; disableWorldTracking: false"
        lod-manager="chunksPerCycle: 6"
>


    <!-- We can define assets here to be loaded when A-Frame initializes -->
    <a-assets>
        <a-asset-item id="AESPA1_01" src="assets/AESPA1_01.glb"></a-asset-item>
        <a-asset-item id="AESPA1_02" src="assets/AESPA1_02.glb"></a-asset-item>
        <a-asset-item id="AESPA1_03" src="assets/AESPA1_03.glb"></a-asset-item>
        <a-asset-item id="AESPA1_LICHT" src="assets/AESPA1_LICHT.glb"></a-asset-item>
        <a-asset-item id="AESPA1_PNG" src="assets/AESPA1_PNG.glb"></a-asset-item>

        <a-asset-item id="AESPA2" src="assets/AESPA2.glb"></a-asset-item>
        <a-asset-item id="AESPA2_LICHT" src="assets/AESPA2_LICHT.glb"></a-asset-item>
        <a-asset-item id="AESPA2_PNG" src="assets/AESPA2_PNG.glb"></a-asset-item>

        <img id="Halo" src="assets/Halo.png">
        <a-asset-item id="HaloSphere" src="assets/HaloSphere.glb"></a-asset-item>

    </a-assets>

        <a-camera
                id="camera"
                raycaster="objects: .cantap"
                cursor="fuse: false; rayOrigin: mouse;"
                position="0 8 8">
            <a-light type="point"  distance="12" intensity="4"></a-light>
        </a-camera>



        <a-entity
                light="
                    type: directional;
                    intensity: 0.5;
                    castShadow: true;
                    shadowMapHeight:2048;
                    shadowMapWidth:2048;
                    shadowCameraTop: 180;
                    shadowCameraBottom: -180;
                    shadowCameraRight: 180;
                    shadowCameraLeft: -180;
                    target: #group;
                    shadowRadius: 5"
                xrextras-attach="target: group; offset: 0 2 10;"
                shadow>
        </a-entity>

    <a-entity class="lightstick-instance"
              lod-object="nearDistance: 25; farDistance: 30"
              position="3 7 -15"
              scale="7 7 7"
              rotation="6 0 -30">

        <a-entity class="lod-mesh-group" visible="true">
            <a-entity class="lod-mesh" gltf-model="#HaloSphere" scale="1 1 1" material="opacity:0.1" render-order="0" unlit-material data-lod-near="7" data-lod-far="10" billboard></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA1_01" render-order="1"></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA1_02" render-order="2"></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA1_03" render-order="3"></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA1_LICHT" render-order="4" unlit-material data-lod-near="7" data-lod-far="10"></a-entity>
        </a-entity>

        <a-entity class="lod-billboard" gltf-model="#AESPA1_PNG" render-order="5" billboard unlit-material></a-entity>

        <a-entity geometry="primitive: plane; width: 0.8; height: 0.8" material="src: #Halo; opacity: 0.5; transparent: true" data-lod-near="6" data-lod-far="11" render-order="0" ground-decal="groundY: 0"></a-entity>

    </a-entity>



    <a-entity class="lightstick-instance"
              lod-object="nearDistance: 25; farDistance: 30"
              position="-3 7 -15"
              scale="7 7 7"
              rotation="20 0 12">

        <a-entity class="lod-mesh-group" visible="true">
            <a-entity class="lod-mesh" gltf-model="#HaloSphere" scale="1 1 1" material="opacity:0.1" render-order="0" unlit-material data-lod-near="7" data-lod-far="10" billboard></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA2" render-order="1"></a-entity>
            <a-entity class="lod-mesh" gltf-model="#AESPA2_LICHT" render-order="2" unlit-material data-lod-near="7" data-lod-far="10"></a-entity>
        </a-entity>

        <a-entity class="lod-billboard" gltf-model="#AESPA2_PNG" render-order="0" billboard unlit-material></a-entity>

        <a-entity geometry="primitive: plane; width: 0.8; height: 0.8" material="src: #Halo; opacity: 0.5; transparent: true" data-lod-near="6" data-lod-far="11" render-order="0" ground-decal="groundY: 0"></a-entity>

    </a-entity>


    <a-entity id="group" position="3 12 -10">
     <!-- <a-sphere></a-sphere> -->
    </a-entity>


        <a-plane
                id="ground"
                rotation="-90 0 0"
                position="-50 0 -50"
                width="500"
                height="500"
                material="shader: shadow"
                shadow
        ></a-plane>


    </a-scene>
</body>

</html>
