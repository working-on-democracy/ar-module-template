<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Module Preview (VR)</title>
  <!-- VR/desktop preview runtime (CDN), pinned to the versions the host uses:
       A-Frame 1.3.0 (the version 8thwall's 8frame is built on) → aframe-extras
       (animation-mixer, …) → xrextras (xrextras-* components).
       NOTE: this preview uses stock A-Frame, not 8frame — 8frame's render loop is driven
       by the 8thwall camera engine, so it never paints standalone. Stock A-Frame self-
       renders and is binary-compatible with the same aframe-extras/xrextras.
       For a true 8thwall AR preview (camera + world tracking) use `npm run dev:ar`. -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/ecs@3/dev8/dev8.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <style>
    body { margin: 0; background: #0f172a; }
    .preview-overlay {
      position: fixed; top: 12px; left: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: white; padding: 8px 12px;
      border-radius: 8px;
      font-family: sans-serif; font-size: 13px;
      z-index: 100; pointer-events: none;
      line-height: 1.4;
    }
    .preview-overlay strong { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="preview-overlay">
    <strong>AR Module Preview</strong><br/>
    VR: "Enter VR"-Button unten-rechts (WebXR-Brille)<br/>
    Desktop: WASD bewegen · Maus umschauen
  </div>
  <div id="app"></div>
  <script type="module" src="/src/preview.ts"></script>
</body>
</html>
