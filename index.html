<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Module Preview (VR)</title>
  <!-- Mirror the host's runtime so modules preview against the same components:
       A-Frame 1.3.0 (the version 8thwall's 8frame is built on) → aframe-extras
       (animation-mixer, …) → xrextras (xrextras-* components). Vendored to pin versions.
       NOTE: we use stock A-Frame here, not 8frame — 8frame's render loop is driven by
       the 8thwall camera engine (xr.js), which a desktop/VR preview can't load (it needs
       an app key + camera), so 8frame never paints standalone. Stock A-Frame self-renders
       and is binary-compatible with the same aframe-extras/xrextras the host uses.
       xrextras-* components that depend on the AR engine (e.g. xrextras-attach to a
       tracked target) simply no-op here. -->
  <script src="/vendor/aframe-1.3.0.min.js"></script>
  <script src="/vendor/aframe-extras-6.1.1.min.js"></script>
  <script src="/vendor/xrextras.js"></script>
  <style>
    body { margin: 0; background: #0f172a; }
    .preview-overlay {
      position: fixed; top: 12px; left: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: white; padding: 8px 12px;
      border-radius: 8px;
      font-family: sans-serif; font-size: 13px;
      z-index: 100; pointer-events: none;
      line-height: 1.4;
    }
    .preview-overlay strong { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="preview-overlay">
    <strong>AR Module Preview</strong><br/>
    VR: "Enter VR"-Button unten-rechts (WebXR-Brille)<br/>
    Desktop: WASD bewegen · Maus umschauen
  </div>
  <div id="app"></div>
  <script type="module" src="/src/preview.ts"></script>
</body>
</html>
